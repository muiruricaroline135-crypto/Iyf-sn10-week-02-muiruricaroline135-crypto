    * {
      margin: 0;

.contact-container {

  padding: 30px;

  max-width: 600px;
}

h1 {
  text-align: center;

}

.form-group {
  margin-bottom: 15px;

  border-radius: 8px;
  font-size: 16px;

  resize: vertical;
  min-height: 120px;
}

  color: white;
  border: none;

  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #444;
}
